name: baas-platform

# Shared BaaS platform infrastructure. Joins the existing external `guildserver`
# network so it can sit alongside the GuildServer PaaS stack without disruption.
#
# Public routing (via the existing guildserver-traefik + *.guildserver.io tunnel):
#   cloud.guildserver.io/{trpc,health,studio,api}  -> baas-api  (priority 20)
#   cloud.guildserver.io/*                          -> baas-web  (priority 1)

services:
  baas-postgres:
    image: supabase/postgres:17.6.1.136
    container_name: baas-postgres
    restart: unless-stopped
    shm_size: 256mb
    ports:
      - "5434:5432"
    environment:
      POSTGRES_PASSWORD: ${BAAS_PG_ADMIN_PASSWORD}
      PGDATA: /var/lib/postgresql/data
    volumes:
      - baas-postgres-data:/var/lib/postgresql/data
    networks:
      - guildserver
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  baas-redis:
    image: redis:7-alpine
    container_name: baas-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - baas-redis-data:/data
    networks:
      - guildserver

  baas-imgproxy:
    image: darthsim/imgproxy:v3.30.1
    container_name: baas-imgproxy
    restart: unless-stopped
    environment:
      IMGPROXY_BIND: ":8080"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: "true"
    networks:
      - guildserver

  baas-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: baas-api
    restart: unless-stopped
    depends_on:
      baas-postgres:
        condition: service_healthy
      baas-redis:
        condition: service_started
    env_file:
      - .env
    environment:
      # Container-network overrides (the .env values are the host view).
      DATABASE_URL: postgres://postgres:${BAAS_PG_ADMIN_PASSWORD}@baas-postgres:5432/postgres
      REDIS_HOST: baas-redis
      REDIS_PORT: 6379
      # Reach tenant published DB ports via the host gateway (tenants live on their
      # own per-project networks, not this one).
      BAAS_TENANT_DB_HOST: host.docker.internal
    ports:
      - "4001:4001"
    volumes:
      # Orchestrate tenant stacks on the host daemon; tenant files at matching paths.
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/baas-tenants:/opt/baas-tenants
      - /opt/baas-backups:/opt/baas-backups
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - guildserver
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=guildserver"
      - "traefik.http.routers.baas-api.entrypoints=web"
      - "traefik.http.routers.baas-api.rule=Host(`cloud.guildserver.io`) && (PathPrefix(`/trpc`) || PathPrefix(`/health`) || PathPrefix(`/studio`) || PathPrefix(`/api`))"
      - "traefik.http.routers.baas-api.priority=20"
      - "traefik.http.routers.baas-api.service=baas-api"
      - "traefik.http.services.baas-api.loadbalancer.server.port=4001"

  baas-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_BAAS_API_URL: https://cloud.guildserver.io
    container_name: baas-web
    restart: unless-stopped
    depends_on:
      - baas-api
    networks:
      - guildserver
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=guildserver"
      - "traefik.http.routers.baas-web.entrypoints=web"
      - "traefik.http.routers.baas-web.rule=Host(`cloud.guildserver.io`)"
      - "traefik.http.routers.baas-web.priority=1"
      - "traefik.http.routers.baas-web.service=baas-web"
      - "traefik.http.services.baas-web.loadbalancer.server.port=3001"

volumes:
  baas-postgres-data:
  baas-redis-data:

networks:
  guildserver:
    external: true
    name: guildserver
